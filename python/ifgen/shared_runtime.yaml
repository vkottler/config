---
includes:
  - config/python/ifgen/settings.yaml
  - config/python/ifgen/sample.yaml
  - config/python/ifgen/cobs.yaml
  - config/python/ifgen/pcm.yaml
  - package://ifgen/plugins/struct_receiver.yaml

enums:
  Action:
    default: POST
    enum:
      POST: {description: Trigger a log message.}
      RESET: {description: Reboot to application.}
      BOOTLOADER: {description: Reboot to bootloader.}

structs:
  Rgb:
    control: false
    fields:
      - name: red
        type: uint8_t
      - name: green
        type: uint8_t
      - name: blue
        type: uint8_t

  RgbDemo:
    fields:
      - name: leds
        type: Rgb
        array_length: 5

  Actionable:
    fields:
      - name: sequence
        type: uint8_t
      - name: action
        type: Action
