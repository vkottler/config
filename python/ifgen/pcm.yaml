---
enums:
  SampleFormat:
    default: S16_LE  # must match Audio sample primitive
    description: |
      Must match:

      https://github.com/alsa-project/alsa-lib/blob/master/include/pcm.h#L128
    enum:
      S16_LE:
        value: 2

  SampleRate:
    underlying: uint32_t
    default: FOUR8
    description: Used as actual underlying integer sample rate value.
    enum:
      FOUR8:
        value: 48000
      DOUBLE:
        value: 96000
      QUAD:
        value: 192000

  FrameRate:
    default: SIXTY
    description: Used as actual underlying integer frame rate value.
    enum:
      SIXTY:
        value: 60
      DOUBLE:
        value: 120
      QUAD:
        value: 240

  WaveShape:
    default: SINE
    enum:
      SINE:
        value: 0
      TRIANGLE: {}
      SQUARE: {}
      SAWTOOTH: {}

  Note:
    default: C
    enum:
      C:
        value: 0
      Db:
        description: Cs
      D: {}
      Eb:
        description: Ds
      E: {}
      F: {}
      Gb:
        description: Fs
      G: {}
      Ab:
        description: Gs
      A: {}
      Bb:
        description: As
      B: {}

structs:
  Audio:
    control: false
    fields:
      - name: sample
        description: audio sample point for all channels
        type: int16_t  # must match SampleFormat default
        array_length: &num_channels 2  # the number of audio channels

  AudioChannelData:
    control: false
    fields:
      - name: volume
        type: &float_t double
        description: average point magnitude
      - name: peak
        description: peak absolute point value
        type: *float_t
      - name: clip
        type: bool
        description: "true if point clipped peak during frame"

  AudioFrameData:
    control: false
    fields:
      - name: volume
        type: *float_t
        description: "'mono' mix volume"
      - name: balance
        type: *float_t
        description: based on first two channels
      - name: channel
        type: AudioChannelData
        array_length: *num_channels
        description: per-channel analysis

  PcmStatus:
    control: false
    fields:
      - name: seconds
        type: uint64_t
      - name: nanoseconds
        type: uint32_t
      - name: buffered_points
        type: uint32_t
  WaveControl:
    fields:
      - name: enable
        type: bool
        default: false
      - name: shape
        type: WaveShape
      - name: note
        type: Note
      - name: gain
        type: *float_t
        default: 1.0
        config: &gain_ctl
          max_val: 1.5
          min_val: 0.0
          step: 0.01
      - name: octave_offset  # needs a UI slider
        type: int8_t
        default: 0
        config:
          max_val: 6
          min_val: -4
  PcmControl:
    fields:
      - name: gain
        type: *float_t
        default: 1.0
        config: *gain_ctl
      - name: channel
        type: WaveControl
        array_length: *num_channels
