---
enums:
  SampleFormat:
    default: S16_LE  # must match Audio sample primitive
    description: |
      Must match:

      https://github.com/alsa-project/alsa-lib/blob/master/include/pcm.h#L128
    enum:
      S16_LE:
        value: 2

  SampleRate:
    underlying: uint32_t
    default: FOUR8
    description: Used as actual underlying integer sample rate value.
    enum:
      FOUR8:
        value: 48000
      DOUBLE:
        value: 96000
      QUAD:
        value: 192000

  WaveShape:
    default: SINE
    enum:
      SINE:
        value: 0
      TRIANGLE: {}
      SQUARE: {}
      SAWTOOTH: {}

  Note:
    default: C
    enum:
      C:
        value: 0
      Db:
        description: Cs
      D: {}
      Eb:
        description: Ds
      E: {}
      F: {}
      Gb:
        description: Fs
      G: {}
      Ab:
        description: Gs
      A: {}
      Bb:
        description: as
      B: {}

structs:
  PcmStatus:
    control: false
    fields:
      - name: seconds
        type: uint64_t
      - name: nanoseconds
        type: uint32_t
      - name: buffered_points
        type: uint32_t
  PcmControl:
    fields:
      - name: enable
        type: bool
      - name: shape
        type: WaveShape
      - name: note
        type: Note
      - name: octave_offset  # needs a UI slider
        type: int8_t

  Audio:
    control: false
    fields:
      - name: sample
        type: int16_t  # must match SampleFormat default
        array_length: 2  # the number of audio channels
