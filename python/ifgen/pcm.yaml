---
structs:
  PcmStatus:
    control: false
    fields:
      - name: seconds
        type: uint64_t
      - name: nanoseconds
        type: uint32_t
      - name: buffered_points
        type: uint32_t
  PcmControl:
    fields:
      - name: frequency
        type: double

  Stereo:
    control: false
    fields:
      - name: left
        type: int16_t
      - name: right
        type: int16_t
