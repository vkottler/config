---
structs:
  PcmStatus:
    control: false
    fields:
      - name: seconds
        type: uint64_t
      - name: nanoseconds
        type: uint32_t
      - name: buffered_points
        type: uint32_t
      - name: channels
        type: int16_t
        array_length: 2

  PcmControl:
    fields:
      - name: frequency
        type: double
